front:
  text: 洞玄靈寳玄門大義儀二
  hash: sha256:2e6750843016046214dbeaf30e58c5a926235ab6b2309827a573065edcb28a7b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0026_HFL_000-001a, image: hfl/0760/0760-086.png}
body:
  text: 正義第一夫十二部經者蓋是通三乘之妙典貫七部之鴻規尋之者知真玩之者悟理出生死之津梁入大道之途逕者也故正一經云三乘所修各十二部釋名第二夫十二部義通於三乘今就次乘爲釋餘例可知十二部者第一本文第二神符第三玉訣第四靈圖第五譜録第六戒律第七威儀第八方法第九衆術第十記傳第十一讚誦第十二表奏言本文者即三元八會之書長行原起之說其例是也真迹紫微夫人云三元八會之書太極高真所用本者始也根也是經教之始文字之根又爲得理之原萬法之本文者分也理也既能分辨二儀又能分列法相既能理於萬事又能表詮至理如木有文亦名爲理也又名真文者十二義通三乘真文教主中洞非通義也神符者即龍章鳳篆之文靈迹符書之字是也神以不測爲義符以符契爲名謂此靈迹神用無方利益衆生信若符契玉訣者如河上釋注之文玉訣解金書之例是也玉名無染訣語疑謂决定了知更無疑染靈圖者如含景五帝之象圖局三一之形其例是也靈妙也圖度也謂度寫妙形傳流下世譜録者如生神所述三君本行所陳五帝其例是也譜緒也録記也謂緒記聖人以爲教法亦是緒其源起使物録持也戒律者如六情十惡之例是也戒者解也界也止也能解衆惡之縛能分善惡之界防止諸惡也律者率也直也慄也率計罪愆直而不枉使懼慄也威儀者如齋法典式請經軌儀之例是也威是儼嶷可畏儀是軌式所宜亦是曲從物宜爲威法也方法者如存三守一制魄拘魂之例是也方者方所法者節度修行治身有方所節度也衆術者如變丹鍊石化形隱景之例是也衆多也術道也爲趣至極之聖道也記傳者如道君本業皇人往行之例是也記誌也傳傳也謂記誌本業傳示學人讚頌者如五真頌九天舊章之例是也讚以表事頌以歌德故詩云頌者美盛德之形容亦曰偈頌也偈頌者以四字五字爲句也表奏者如六齋啓願三會謁請之例是也表明也奏凑也謂表明心事上凑大道通言部者以部類爲義亦以部别其義類以相從也無方釋義十二玄通制别意如前解然十二部内唯本文有通相别相以十二部皆是文字爲得理之本文猶是經之異名十二既通名爲經是通相本文也於通相文内别出一部是五篇真文有生天立地之能是一切法本爲别相本文也不可言十二部是玉訣别出一部是别相玉訣也餘部例然其又有長行爲偈本稱本文者餘二乘經望此可知岀體第三十二部經通皆以文爲體名味往尋自有全以文爲名者自有全以詮理爲名者自有文理合爲名者有四部但以文名别體即是本文神偈符頌靈圖等也按此四名無的明義但以文爲其體靈圖乃不是文既言象相類亦從文攝次有四部全以詮理之名别體即是威儀譜録記傳表奏等也威儀是容上之法譜録是祖繫之源記傳序其功名表奏啓其心迹故皆就理事工能爲體也次有四部通以文理之名别體即是戒律玉訣方法衆術等也戒律則通心與教戒是心善亦通戒勑律是言語銓量亦通心之秉直也玉訣即道事理解玉訣文之理事方也詣事處法該文理術通經術故爲文衆智數故爲理也明同異第四體同異者有四句一者異二者同三者亦同亦異四者非同非異異句者此十二部並得異體四文體别故不得同八工義殊數自成異然八工不離四文而言十二異體者有二義故然一者自有四文無八工能二者玄望若以工能在一文中則與三文異體若在三文中則與一文異體故皆得不同也同句者十二部無離通相本文皆同體也亦同亦異句者有别相本文有通相本文别相本文即是一千一百九字爲體其二百五十六字意觀似與譜録記傳讚頌同體其六十三字與衆術同體其一百二十二字無注解者是所未詳通相本文者即是長存之經爲偈本之本文也此與八工體同三文體異也神符有得與玉訣同體何者若玉訣變此符字爲隸者此符與玉訣同體若不變字形雖解符義不得同體餘例可知望解注靈圖則並非同體非同非異者文學相空無可論同異也曲論如此大意者同則皆是文異則十二文事合故亦異同不可定故非同非異也明次第第五本文是生法之本數自居前既生之後須即扶養故次辨神符八會雲篆三元玉字若不諳鍊豈能致益故須玉訣釋其理事也衆生闇鈍直聞聲教不能悟解故立圖像助以表明聖功既顯若不是其祖宗物情容言假僞故須顯其譜録也此之五條生物義足將欲輔成必須鑒戒惡法交弊宜前防止故有戒律既捨俗入道出家受戒簉於師寳須善容儀故次明威儀也又前乃防惡宿罪未除故須修齋軌儀悔三生惡也儀容既善宿根已淨須進學方學理期真當假道術道術之妙顯乎記傳論其習學以次相從也亦是學工既著名傳竹帛故次記傳始自生物終乎行成皆可嘉稱故次有讚頌又前諸言教多是長行散說今論讚頌即是句偈結辭既功滿德成故須表申靈府如齋訖言功之例故申奏也又前十二部明出世之行後之表奏祛世間之灾如三元塗炭子午請命之流皆關表也詳釋第六即爲十二重一釋本文前就洞玄爲釋若具足爲言名空釋赤書景皇真文聖應唯是一文之經隨五帝所當開爲五篇帝之與篇各有名字出真文上卷東方安寳華林青靈始老帝君名靈威仰所掌真文名曰生神寳真洞玄章一名東山神呪八威策文南方梵寳昌陽丹靈真老帝君名赤熛弩所掌真文名曰南雲通天寳衿一名九天神呪一名赤帝八威策文中央玉寳元靈元老帝君名含樞紐所掌真文名曰寳劫洞清九天靈書一名黄帝靈威策文西方七寳金門皓靈皇老帝君名耀伯寳所掌真文名曰金真寳明洞微篇一名西山神呪一名八威召龍文北方洞隂朔單鬱絶五靈玄老帝君名協光紀所掌真文名曰元神生真寳明文一名北山神呪一名八威制天文五老玉篇皆空洞自然之文也委釋此文如彼流本文大意正是天書今汎論古今變文凡有六種一者隂陽初分有三元五德八會之炁以成飛天之書後撰爲八龍雲篆明光之章陸先生解三才謂之三元三元既立五行咸具以五行爲位三五合和謂之八會爲衆書之原又有八龍雲篆明光之章自然飛玄之炁結空成文字方一丈肇於未天之内生立一切也按真迹紫微夫人說三元八會建文章之祖八龍雲篆是其根宗所起有書之始而先生云八會是三才五行便在既判之後赤書又云靈寳赤書五篇真文出於元始之先即此而論三元應非三才五德非五行也此正應是三寳丈人之三炁耳有五德故九天生神章云天地萬物自非三元所育九炁所導莫能生也又曰三炁爲天地之尊九炁爲萬物之根故知三元在天地未開三才未生之前也一家同宋法師八會只是三元五德三元者一曰混洞太無元高上玉虚之炁二曰赤混太無元無上紫虚之炁三曰㝠寂玄通元無上清虚之炁五德者所本有三即隂陽和隂有少隂太隂陽有少陽太陽就和中之和五德也篆者撰集雲書謂之雲篆此即三元八會之文八龍雲篆之章皆是天書三元八會則五文八字之例是也雲篆明光則五符五勝之例是也八會本文凡一千一百九字其五篇真文合六百六十八字是三才之元根生天立地開化人神萬物所由故云有天道地道神道人道此之謂也玉訣云修用此法五篇皆分字數各有四條一者主召九天上帝校神仙圖籙求仙致真之法二者主召天宿星官正天分度保國寧民之道三者攝制酆都六天内音天有八字之氣四者勑命水帝制召龍魚也其諸天内音天有八字三十二天合二百五十六字論諸天度數期會大聖真仙名諱位號所治宫府臺城處所神仙變化升降品次衆魔種類人鬼生死轉輪因縁其六十三字是五方元精名號服御求仙練神化形白日升空之法餘一百二十二字闕無音解二者演八會爲龍鳳之文謂之地音地書此下皆玄聖所述以寫天文也三者軒轅之時蒼頡傍龍鳳之勢採鳥跡爲古文以代結繩即體也四者周時史籀音宙變古文爲大篆五者秦時李斯變大篆爲小篆六者秦後程邈變小篆爲隸書有云漢謂隸書曰佐書此乃程邈獄中所造出捉徒隸故以隸爲名此即爲六也就第二中又有雲篆明光之章爲順形梵書文别爲六十四種播於三十六天令經書相傳皆以隸字解天書相離而行也釋本文第初傳古文者有邯鄲淳又有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莽時使司徒甄酆校定文字復有六書一曰古文孔子壁中書二曰竒字古之異者三曰篆書四曰佐書即隸書也五曰縁篆所以摹印也六曰鳥篆所以書幡也蒼頡始書已應有筆詩云彤管則是筆者也而言蒙恬造筆者恬爲秦將三世有名制筆精能獨擅竒名也漢和帝時蔡倫始造紙爾前唯書簡牒牒者詮牒語事也簡者在簡略恐是文字不繁也但知本是天書金簡餘地書已下八體六文皆從真出外學者自更詳之又未知何時書於此經在紙作卷今謂劫初己自有筆太真所書何容無紙及以八體六文等耶以而尊造化具一切法故也後人承用自有前後耳釋神符第二一切萬法莫不以精炁爲用故二儀三景皆以精炁行乎其中萬物既有亦以精炁行乎其中也是則五行六物莫不有精炁者也以道之精炁布之簡墨會物之精炁以却邪僞輔正真召會群靈制御生死保持劫運安鎮五方然此符字本於結空太真仰寫天文分置方位區别圖像符書之異符者通取雲物日辰之勢書者别析音句銓量之㫖圖者書取靈變之狀然符中有書參八圖像書中有圖形聲並用故有八體六文更相顯發六文者一曰象形日月是也二曰指事上下是也三曰形聲江河是也四曰會意武信是也五曰轉注考老是也六曰假借令長是也八體者一曰天書八會是也二曰神書雲篆是也三曰地書龍鳳之象四曰内書龜龍魚爲所吐五曰外書鱗甲羽毛所𡕀音載六曰鬼書雜體微末七曰夏書模範雲篆八曰戎夷書類於昆蟲此六文八體或今字同古或古字同符更相加減共成一法合爲一用故同異無定也而三洞經中符有作今字者此以古文尚書中有與今字同者耳釋玉訣第三此别有經二卷太上道君於南丹洞陽上觀爲學士王龍賜說此靈文玉字之訣但未知定是何代所注學者尋之又說諸修行符圖五方思存禳灾等法正是解訣八會之文而就本文理中復有明理如解真文中更明感通之理定志又出思微之義事中復有事如玉訣中復明傳經及盟授威儀之事然訣中凡有解訣皆通謂之玉訣也釋靈圖第四圖書之作俱出形聲至於玄聖著述各有功用圖以傳有書以傳無無者言之與理無有形迹定志局等之例是也有者有形之與迹八景及人鳥之例是也書圖亦可通於有無以如前出思之也云或鎮藏五嶽以保劫運或宣被十方開化周普或祕之金格以示禁重天文或藏之名山明會乃出或題之宫闕隨行處所安或書之空林顯神通力用或行之五國表縁所宜或及之三清辯升沈異域或宣之上古拯物之迷或傳之下世哀物之苦皆大慈之德隨病設方大哀之心赴縁說法也釋譜録第五如生神章前三寳君及本業道君自序宿世根本之例是也録者條别神明位次名諱八景及内音之例是也譜者之爲用衆生或謂生死之理倏然而有倏然而無如彼草木無所縁起故述本宿因令其得悟録亦是條牒名領以付學人令其領録存思以自防保舉人身以升天也大洞所明即上皇玉録之例是也釋戒律第六戒法者即止惡也止者止惡心口爲誓不作惡也戒之爲義又有詳略詳者太清道本無量法門百二十九條老君及三元品戒百八十條觀身大戒三百條太一六十戒之例是也略者道人三戒録生五戒祭酒八戒想爾九戒智慧上品十戒明真科二十四戒之例是也律者終出戒中無更别目多論罪報憲法之科如天師老君玄都律女青等律是也斯則戒主於因律主於果戒論防惡律論與罪故也然或空中而下或口内傳授皆隨機而作授受不同同如上品戒則弟子向東定志戒則弟子向南金籙簡文則天尊北向若東向者向陽位也依三元品戒則東方南方爲左官屬太陽西方北方爲右官屬太隂初先謝罪求度故向太隂所以北向回禮十方次請生求義故向太陽所以東向而受也定志所明法師居南弟子向師幕側首向之以理而推則法師居多向北與金籙同上品戒弟子向東定志戒弟子向南此皆使弟子向生氣也問生神章及二十四生圖法師向南向北與此不類復何義耶答此經于時天尊面命三天真人傳二十四生圖與道君命九天司馬侍仙玉郞傳生神章與飛天神王飛天神王及道君于時北向請天尊使者銜天尊命從天尊邊來仍授但是傳經簡異於授戒不得爲例也釋威儀第七三元本有威儀俯仰之格三千四百條龍漢之後文多不備今所出有二百四十條此以末世不堪故略不傳耳論齋功德者宋師舊舉六條今家大明二種一者極道二者濟度極道者洞神經云心齋坐忘極道矣濟度者依經緫有三籙七品三籙者一者金籙齋上消天灾保鎮帝王二者玉籙齋救度人民請福謝過三者黄籙齋下拔地獄九玄之苦七品者一者三皇齋求仙保國二者自然齋修真齊道三者上清齋升虚入妙四者指教齋禳灾救疾五者塗炭齋悔過請命六者明真齋拔幽夜之魂七者三元齋謝三官之罪此等諸齋或一日一夜或三日三夜或七日七夜具如儀軌其外又有六齋十直甲子庚申八節本命百日千日等齋通用自然之法其六齋月正月三月五月七月九月十一月也又有三長齋月即正月七月十月是也十直者月一日八日十四日十五日十八日二十三日二十四日二十八日二十九曰三十日是也八節所謂立春春分立夏夏至立秋秋分立冬冬至其諸齋日等更不曲辯釋方法第八舊云大略有九一者麤食二者蔬食三者節食四者服精五者服芽六者服光七者服氣八者元氣九者胎食麤食者麻麥也蔬食者菜茄也節食者中食也服精者符水及丹英也服芽者五方雲芽也服光者日月七元三光也服氣者六覺之氣天地四方之妙氣也服元氣者一切禀三元之氣太和之精在于太虚也胎食者我自所得元精之和爲胞胎之元即清虚降四體之氣不復關外也麤食止諸躭嗜蔬食節諸肥腴節食除煩濁服精其身神體成英華服芽變爲芽服光化爲光服六氣化爲六氣遊乎十方服元炁化爲元氣與天地合體服胎氣反爲嬰童與道混合爲一也此之變化運數改易不復待捨身而更受身往來生死也令意方法未必止是食事其或是方藥或按摩等事可尋也釋衆術第九無所不通大而論之略有五事一者思神存真二者心齋坐忘三者步虚飛空四者餐吸元氣五者導引三光此皆心氣相使而神道㝠通論其變化凡有三種一者白日升天二者尸解三者滅度形不灰也白日升天者功成道備三萬六千神及三一帝一混合爲體體成妙一故能與神俱遊即身而升天也又誦大洞經及人鳥山不須服御而得雲輿迎者其身亦已化又上詣朱陵受鍊也二尸解者如位業義明三滅度者如太一守尸或經年歲尸還成人也釋記傳第十記則追誌過去之事亦有傳記未來之事凡聖神之體有二事一者自然二者學得也大洞經者從死得生從生得道從道得仙從仙得真從真得爲上清黄老君如三十九真二十四帝百八十道君天尊上聖亦有自然妙氣應化所作亦有修習後成自然後學合爲一也然此聖真階次萬品略言大意如位業科其七真列紀道君等傳譜記傳也釋讚頌第十一四言可象四時四氣五言以法五行五德七言以法七元七曜此有本文讚頌如九天生神之流以三洞飛玄之炁是本文讚頌也後諸經中或有道君真人諸天讚頌此皆玄聖所作共在經中凡天書玉字雖本出梵音至於行教說經亦隨類得解如書真文本是三元八會梵天之音今以隷書又以此音譯傳書則篆隸兩存譯則此顯而梵隱也及九天生神章則本文不傳梵音不出但有隸字而此音也至於内音玉字則有異同同者亦以隸字傳篆書異者不以此音譯梵語故文單複不可解也而天真皇人演之仍用大梵之音而語此間即以此間之物合玄都之事故知真聖之音音可以通施衆物也表奏第十二此條正一偏多但一切萬機其迹各别故聖人垂法制之以事然道在人心而方須以表奏者既未能㝠會則因事而顯事顯則心明故盡其形迹也夫人心無質運之有境境淨則心明心明則行潔行潔可以交神靈心明可以會天道故登壇告盟憑章表奏啓心形俱盡人神合會也章信科云輸物明信信道捨財消灾散禍多名其要有三者賜與凡夫爰及鳥獸蠕動蝖飛皆同布施二者供奉三等崇飾三寳周給聖賢同曰供養明教第一以明三十六部之義三乘之中乘各有前十二部故合成三十六部也論其相攝者一往大乘具有三十六部中乘具二十四部小乘唯十二部何者以大得兼小故也又大乘得學爲徧行也小不得兼學大止十二中乘可知此遠論男内化門意也用論三洞即是會前三乘入此一乘故三洞大唯一乘耳而又約三洞開三欲示一乘之内無所不包故自後明三亦示一三不三三一不一不三正義也問會三歸一三乘在不答元在不在若不在何所會若在何名會耶明行第二有二經不同一者太玄都老子自然齋儀玄經有三條一曰天經天真所修二曰地經洞天所習三曰人經世間所行三境之法相通而一一品曰三乘三乘之用各有十二條交會相通緫曰三十六部十二條者一曰無爲二曰有爲三曰無爲而有爲四曰有爲而無爲五曰續愛六曰斷愛七曰不斷不續八曰分段九曰無分段十曰知微十一曰知章十二曰通用當境而言亦曰十二部隱顯兼施則有七十二部今謂此文所出前之三經經自可是教後之十二意在行也二者正一所明十二者一者心迹俱無爲二者心無爲迹有爲三者心有爲迹無爲四者捨家處人間五者携家入川澤六者出世與人隔絶七者與世和光同塵八者斷欲斯斷九者不斷十者遊空中十一者在地下十二者住天上三乘皆有十二故成三十六都釋文意已在位業義科但此兩經名味不同者亦當教自是一途之說耳但太玄所出多據於心正一所明通論心迹但太玄十二中第八一事言分段者事如涉迹又顯洞玄靈寳玄門大義
